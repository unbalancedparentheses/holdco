services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - HOLDCO_DB=/app/data/holdco.db
    command: streamlit run app.py --server.address 0.0.0.0

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - HOLDCO_DB=/app/data/holdco.db
    command: uvicorn api:app --host 0.0.0.0
