<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Holdco{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /*
     * Design system: FT-inspired editorial finance dashboard
     * Typography: Source Serif 4 (display), Inter (body), JetBrains Mono (data)
     * Palette: warm ivory paper with teal accents
     */

    :root {
      --paper: #fff1e5;
      --paper-dark: #f2dfce;
      --white: #ffffff;
      --ink: #1a1a1a;
      --ink-secondary: #4a4a4a;
      --ink-light: #707070;
      --ink-faint: #999999;
      --rule: #cec6b9;
      --rule-light: #ded6c9;
      --rule-heavy: #1a1a1a;
      --teal: #0d7680;
      --teal-light: #e6f3f4;
      --claret: #990f3d;
      --claret-light: #f9e8ee;
      --wheat: #f2dfce;
      --oxford: #0f5499;
      --mandarin: #ff8833;
      --jade: #00994d;
      --jade-light: #e6f5ed;
      --crimson: #cc0000;
      --crimson-light: #ffe6e6;
      --lemon: #f2a900;
      --lemon-light: #fef5e0;

      --display: 'Source Serif 4', Georgia, 'Times New Roman', serif;
      --body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --data: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--body);
      background: var(--paper);
      color: var(--ink-secondary);
      font-size: 0.875rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ---- Masthead ---- */
    .masthead {
      background: var(--ink);
      padding: 0.5rem 0;
      text-align: center;
    }
    .masthead-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .masthead-label {
      font-family: var(--body);
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .masthead-title {
      font-family: var(--display);
      font-size: 0.875rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.02em;
    }

    /* ---- Navigation ---- */
    .nav-bar {
      background: var(--white);
      border-bottom: 1px solid var(--rule);
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: stretch;
      height: 3rem;
    }
    .nav-brand {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.025em;
      display: flex;
      align-items: center;
      margin-right: 2rem;
    }
    .nav-links {
      display: flex;
      gap: 0;
      align-items: stretch;
    }
    .nav-links a {
      display: flex;
      align-items: center;
      padding: 0 0.875rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-light);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-links a:hover {
      color: var(--ink);
    }
    .nav-links a.active {
      color: var(--ink);
      border-bottom-color: var(--teal);
    }

    /* ---- Layout ---- */
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.75rem 2rem 3rem;
    }

    /* ---- Page title ---- */
    .page-title {
      margin-bottom: 1.75rem;
    }
    .page-title h1 {
      font-family: var(--display);
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .page-title .deck {
      font-size: 0.9375rem;
      color: var(--ink-light);
      margin-top: 0.375rem;
      line-height: 1.5;
    }
    .page-title-rule {
      margin-top: 0.875rem;
      border: none;
      border-top: 4px solid var(--ink);
    }

    /* ---- Metrics strip ---- */
    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      margin-bottom: 2rem;
    }
    .metric-cell {
      padding: 1.125rem 0;
      border-right: 1px solid var(--rule);
    }
    .metric-cell:last-child { border-right: none; }
    .metric-cell:first-child { padding-right: 1.5rem; }
    .metric-cell:not(:first-child) { padding-left: 1.5rem; padding-right: 1.5rem; }
    .metric-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
    }
    .metric-value {
      font-family: var(--display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-top: 0.125rem;
    }
    .metric-note {
      font-size: 0.75rem;
      color: var(--ink-light);
      margin-top: 0.125rem;
    }

    /* ---- Grid layouts ---- */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 900px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* ---- Section ---- */
    .section { margin-bottom: 2.5rem; }
    .section-head {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 0;
    }
    .section-head h2 {
      font-family: var(--display);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .section-head .count {
      font-family: var(--data);
      font-size: 0.6875rem;
      color: var(--ink-faint);
    }

    /* ---- Panel (card with no radius, FT style) ---- */
    .panel {
      background: var(--white);
      border: 1px solid var(--rule);
    }
    .panel-flush { border-left: none; border-right: none; }

    /* ---- Data tables ---- */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      padding: 0.625rem 0.875rem;
      text-align: left;
      border-bottom: 2px solid var(--rule);
      background: var(--white);
      white-space: nowrap;
    }
    tbody td {
      padding: 0.5rem 0.875rem;
      font-size: 0.8125rem;
      color: var(--ink-secondary);
      border-bottom: 1px solid var(--rule-light);
      vertical-align: baseline;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(0,0,0,0.015); }

    .td-name {
      font-weight: 500;
      color: var(--ink);
    }
    .td-mono {
      font-family: var(--data);
      font-size: 0.75rem;
    }
    .td-num {
      font-family: var(--data);
      font-size: 0.8125rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    th.th-num {
      text-align: right;
    }
    .td-muted {
      color: var(--ink-faint);
    }
    .td-link {
      color: var(--teal);
      text-decoration: none;
    }
    .td-link:hover { text-decoration: underline; }

    /* ---- Tags / badges ---- */
    .tag {
      display: inline-block;
      padding: 0.0625rem 0.4375rem;
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid;
    }
    .tag-teal    { color: var(--teal);    border-color: var(--teal);    background: var(--teal-light); }
    .tag-claret  { color: var(--claret);  border-color: var(--claret);  background: var(--claret-light); }
    .tag-jade    { color: var(--jade);    border-color: var(--jade);    background: var(--jade-light); }
    .tag-crimson { color: var(--crimson); border-color: var(--crimson); background: var(--crimson-light); }
    .tag-lemon   { color: #9a6b00;       border-color: var(--lemon);   background: var(--lemon-light); }
    .tag-ink     { color: var(--ink-light); border-color: var(--rule);  background: var(--white); }

    /* ---- Breakdown list ---- */
    .breakdown-list { }
    .bkd-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.4375rem 0.875rem;
      border-bottom: 1px solid var(--rule-light);
    }
    .bkd-row:last-child { border-bottom: none; }
    .bkd-label {
      font-size: 0.8125rem;
      color: var(--ink-secondary);
      flex: 0 0 130px;
    }
    .bkd-bar {
      flex: 1;
      height: 3px;
      background: var(--rule-light);
      border-radius: 1.5px;
      overflow: hidden;
    }
    .bkd-fill {
      height: 100%;
      background: var(--teal);
      border-radius: 1.5px;
    }
    .bkd-val {
      font-family: var(--data);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--ink);
      flex: 0 0 1.5rem;
      text-align: right;
    }

    /* ---- Tree indent ---- */
    .indent {
      padding-left: 1.75rem;
      position: relative;
    }
    .indent::before {
      content: '';
      position: absolute;
      left: 0.625rem;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--rule);
    }
    .indent::after {
      content: '';
      position: absolute;
      left: 0.625rem;
      top: 50%;
      width: 0.625rem;
      height: 1px;
      background: var(--rule);
    }

    /* ---- Currency chip ---- */
    .ccy {
      font-family: var(--data);
      font-size: 0.6875rem;
      color: var(--ink-faint);
      margin-left: 0.25rem;
    }

    /* ---- Empty ---- */
    .empty-state {
      padding: 2.5rem 1rem;
      text-align: center;
      color: var(--ink-faint);
      font-size: 0.8125rem;
    }
    .empty-state a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }

    /* ---- Breadcrumb ---- */
    .breadcrumb {
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
      margin-bottom: 0.375rem;
    }
    .breadcrumb a {
      color: var(--teal);
      text-decoration: none;
    }
    .breadcrumb a:hover { text-decoration: underline; }

    /* ---- Deck link ---- */
    .deck-link {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }
    .deck-link:hover { text-decoration: underline; }

    /* ---- Detail grid ---- */
    .detail-grid { }
    .detail-row {
      display: flex;
      gap: 1rem;
      padding: 0.5rem 0.875rem;
      border-bottom: 1px solid var(--rule-light);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      flex: 0 0 120px;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
      padding-top: 0.125rem;
    }
    .detail-value {
      flex: 1;
      font-size: 0.8125rem;
      color: var(--ink);
    }

    /* ---- Footer ---- */
    .footer {
      margin-top: 2rem;
      padding: 1.25rem 0;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-text {
      font-size: 0.6875rem;
      color: var(--ink-faint);
      letter-spacing: 0.02em;
    }
    .footer-links a {
      font-size: 0.6875rem;
      color: var(--ink-light);
      text-decoration: none;
      margin-left: 1.5rem;
    }
    .footer-links a:hover { color: var(--ink); }

    /* ---- Print ---- */
    @media print {
      body { background: #fff; font-size: 9pt; }
      .masthead, .nav-bar, .footer { display: none; }
      .page { max-width: 100%; padding: 0; }
      .panel { border: 1px solid #ddd; break-inside: avoid; }
      .section { break-inside: avoid; }
      .grid-2 { grid-template-columns: 1fr 1fr; gap: 1rem; }
      .tag { border: 1px solid #999; background: transparent; }
      a { color: inherit; text-decoration: none; }
      .metrics-strip { border: 1px solid #ddd; }
      .metric-cell { border-right-color: #ddd; }
    }
  </style>
</head>
<body>
  <div class="masthead">
    <div class="masthead-inner">
      <span class="masthead-label">Portfolio Management</span>
      <span class="masthead-title">Holdco</span>
      <span class="masthead-label">Open Source</span>
    </div>
  </div>
  <div class="nav-bar">
    <div class="nav-inner">
      <a href="/" class="nav-brand">Holdco</a>
      <div class="nav-links">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Overview</a>
        <a href="/admin/core/company/">Companies</a>
        <a href="/admin/core/assetholding/">Holdings</a>
        <a href="/admin/core/bankaccount/">Accounts</a>
        <a href="/admin/">Admin</a>
        <a href="/api/entities">API</a>
      </div>
    </div>
  </div>
  <div class="page">
    {% block content %}{% endblock %}
    <div class="footer">
      <span class="footer-text">Holdco &mdash; Open source holding company management</span>
      <div class="footer-links">
        <a href="/admin/">Administration</a>
        <a href="/api/stats">API</a>
        <a href="/api/export">Export</a>
      </div>
    </div>
  </div>
</body>
</html>
